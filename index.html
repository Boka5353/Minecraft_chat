<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftCube - Discord Web Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==========================================================================
           1. STYLIZACJA INTERFEJSU (CSS)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #313338;
            color: #dbdee1;
            overflow: hidden;
            height: 100vh;
        }

        .discord-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* PASEK IKON SERWERÓW (LEWY SKRAJNY) */
        .server-sidebar {
            background-color: #1e1f22;
            width: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            gap: 8px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background-color: #313338;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #dbdee1;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .server-icon:hover, .server-icon.active {
            border-radius: 30%;
            background-color: #5865f2;
            color: white;
        }

        .separator {
            width: 32px;
            height: 2px;
            background-color: #35363c;
            margin: 4px 0;
        }

        /* PASEK KANAŁÓW Bocznych */
        .channels-sidebar {
            background-color: #2b2d31;
            width: 240px;
            display: flex;
            flex-direction: column;
        }

        .server-header {
            height: 48px;
            border-bottom: 1px solid #1f2023;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-weight: bold;
            font-size: 15px;
            color: white;
        }

        .channels-list {
            flex: 1;
            padding: 12px 8px;
            overflow-y: auto;
        }

        .category {
            font-size: 12px;
            font-weight: bold;
            color: #949ba4;
            margin-top: 16px;
            margin-bottom: 4px;
            padding-left: 8px;
            text-transform: uppercase;
        }

        .channel {
            padding: 6px 8px;
            border-radius: 4px;
            color: #949ba4;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }

        .channel:hover {
            background-color: #35373c;
            color: #dbdee1;
        }

        .channel.active {
            background-color: #404249;
            color: white;
        }

        /* DOLNY PROFIL UŻYTKOWNIKA */
        .user-profile {
            background-color: #232428;
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background-color: #5865f2;
            border-radius: 50%;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 14px;
            font-weight: bold;
            color: #f2f3f5;
        }

        .user-tag {
            font-size: 12px;
            color: #949ba4;
        }

        /* OKNO CZATU (ŚRODEK) */
        .chat-area {
            background-color: #313338;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 48px;
            border-bottom: 1px solid #26272b;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: bold;
            color: white;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background-color: #4e5058;
            border-radius: 50%;
        }

        .message-content {
            display: flex;
            flex-direction: column;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-name {
            font-weight: bold;
            color: #f2f3f5;
            font-size: 15px;
        }

        .timestamp {
            font-size: 12px;
            color: #949ba4;
        }

        .message-text {
            color: #dbdee1;
            margin-top: 4px;
        }

        .chat-input-area {
            padding: 0 16px 24px 16px;
        }

        .input-container {
            background-color: #383a40;
            border-radius: 8px;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }

        .input-container input {
            background: none;
            border: none;
            flex: 1;
            color: #dbdee1;
            font-size: 16px;
            outline: none;
        }

        .input-container i {
            color: #b5bac1;
            font-size: 20px;
            cursor: pointer;
        }

        /* PRAWA LISTA CZŁONKÓW */
        .members-sidebar {
            background-color: #2b2d31;
            width: 240px;
            padding: 24px 8px;
            overflow-y: auto;
        }

        .member-group {
            font-size: 12px;
            font-weight: bold;
            color: #949ba4;
            padding-left: 8px;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .member {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .member:hover {
            background-color: #35373c;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            background-color: #4e5058;
            border-radius: 50%;
            position: relative;
        }

        .member-avatar::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background-color: #23a55a;
            border: 2px solid #2b2d31;
            border-radius: 50%;
        }

        .member-name {
            font-size: 14px;
            display: flex;
            flex-direction: column;
        }

        .role-badge {
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            margin-left: 4px;
            text-transform: uppercase;
            display: inline-block;
        }

        .admin-color { color: #f5a623 !important; }
        .gracz-color { color: #23a55a !important; }

        /* NAKŁADKA LOGOWANIA */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1e1f22;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background-color: #313338;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-box h2 {
            color: white;
            text-align: center;
            margin-bottom: 5px;
        }

        .login-box input {
            background-color: #1e1f22;
            border: 1px solid #111;
            border-radius: 4px;
            padding: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            width: 100%;
        }

        .btn {
            background-color: #5865f2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .btn:hover {
            background-color: #4752c4;
        }
    </style>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>Zaloguj się do CraftCube</h2>
            <p style="color: #949ba4; font-size: 13px; text-align: center; margin-bottom: 10px;">
                Kliknij przycisk, aby wejść! Hasło nie jest sprawdzane.
            </p>
            <input type="text" id="usernameInput" placeholder="Nazwa użytkownika (Login)..." value="boka">
            <input type="password" id="passwordInput" placeholder="Hasło..." value="123">
            <button onclick="wejdzDoAplikacji()" class="btn">Zaloguj się</button>
        </div>
    </div>

    <div class="discord-container" style="display: none;" id="appContainer">
        
        <div class="server-sidebar">
            <div class="server-icon active"><i class="fa-solid fa-cube"></i></div>
            <div class="separator"></div>
            <div class="server-icon"><i class="fa-solid fa-plus"></i></div>
        </div>

        <div class="channels-sidebar">
            <div class="server-header">
                <h3>CRAFTCUBE.PL</h3>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            
            <div class="channels-list" id="channelsList">
                </div>

            <div class="user-profile">
                <div class="user-avatar"></div>
                <div class="user-info">
                    <span class="username" id="myUsername">Gość</span>
                    <span class="user-tag" id="myRole">Ranga</span>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <h4 id="currentChannelName"><i class="fa-solid fa-hashtag"></i> lewele</h4>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <i class="fa-solid fa-circle-plus"></i>
                    <input type="text" id="messageInput" placeholder="Napisz..." onkeypress="handleKeyPress(event)">
                    <i class="fa-solid fa-face-smile"></i>
                </div>
            </div>
        </div>

        <div class="members-sidebar" id="onlineMembersList">
            </div>

    </div>

    <script>
        let myNick = "Użytkownik";
        let myCurrentRole = "GRACZ";
        let activeChannelId = "lewele";

        const messagesDatabase = {};

        const mockChannels = [
            { id: 'lewele', name: 'lewele', type: 'text', category: 'Strefa Główna' },
            { id: 'ogloszenia_gl', name: '📢 ogłoszenia 📢', type: 'text', category: 'Strefa Główna' },
            { id: 'rekru', name: 'rekru ➕ 👑', type: 'text', category: 'Strefa Główna' },
            { id: 'max3', name: 'max 3', type: 'voice', category: 'Strefa Główna' },
            { id: 'ogloszenia_inf', name: 'ogłoszenia', type: 'text', category: 'INFORMACJE' },
            { id: 'live', name: 'LIVE', type: 'voice', category: 'LIVE-STREAM' },
            { id: 'poczekalnia', name: 'POCZEKALNIA', type: 'voice', category: 'LIVE-STREAM' },
            { id: 'gartic', name: '🔴 Gartic phone', type: 'voice', category: 'LIVE-STREAM' },
            { id: 'pomoc_techniczna', name: 'pomoc-techniczna', type: 'text', category: 'SUPPORT' },
            { id: 'bany_muty', name: 'bany-muty', type: 'text', category: 'SUPPORT' },
            { id: 'stworz_ticket', name: '📇 stwórz-ticket', type: 'text', category: 'Pomoc 13-20' },
            { id: 'pomoc1', name: '📢 Pomoc 1', type: 'voice', category: 'Pomoc 13-20' },
            { id: 'pomoc2', name: '📢 Pomoc 2', type: 'voice', category: 'Pomoc 13-20' },
            { id: 'pomoc3', name: '📢 pomoc 3', type: 'voice', category: 'Pomoc 13-20' },
            { id: 'pomoc4', name: '📢 Pomoc 4', type: 'voice', category: 'Pomoc 13-20' }
        ];

        // GWARANTOWANA FUNKCJA PRZEJŚCIA PO KLIKNIĘCIU PRZYCISKU
        function wejdzDoAplikacji() {
            const userIn = document.getElementById('usernameInput').value.trim();
            
            // Przypisanie rangi na podstawie wpisanego loginu
            if (userIn.toLowerCase() === 'boka' || userIn.toLowerCase() === 'seba') {
                myNick = userIn.toLowerCase() === 'boka' ? "Boka 👑 GG" : "Owner_Seba";
                myCurrentRole = "ADMIN";
            } else {
                myNick = userIn ? userIn : "kamilox33";
                myCurrentRole = "GRACZ";
            }

            // Przełączanie ekranu (Ukryj logowanie, pokaż Discorda)
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            
            // Wstawienie danych do profilu
            document.getElementById('myUsername').innerText = userIn ? userIn : "Gość";
            document.getElementById('myRole').innerText = `Ranga: ${myCurrentRole}`;

            // Ładowanie komponentów aplikacji
            loadMockChannels();
            updateMockUsers();
            selectChannel('lewele', 'lewele');
        }

        function loadMockChannels() {
            const listContainer = document.getElementById('channelsList');
            if(!listContainer) return;
            listContainer.innerHTML = "";
            
            let currentCategory = "";

            mockChannels.forEach(chan => {
                if (chan.category !== currentCategory) {
                    currentCategory = chan.category;
                    const catDiv = document.createElement('div');
                    catDiv.className = 'category';
                    catDiv.innerHTML = `${currentCategory}`;
                    listContainer.appendChild(catDiv);
                }

                const chanDiv = document.createElement('div');
                chanDiv.className = `channel ${chan.id === activeChannelId ? 'active' : ''}`;
                const icon = chan.type === 'text' ? 'fa-hashtag' : 'fa-volume-high';
                
                chanDiv.innerHTML = `<i class="fa-solid ${icon}"></i> ${chan.name}`;
                chanDiv.onclick = () => selectChannel(chan.id, chan.name);
                listContainer.appendChild(chanDiv);
            });
        }

        function selectChannel(id, name) {
            activeChannelId = id;
            document.getElementById('currentChannelName').innerHTML = `<i class="fa-solid fa-hashtag"></i> ${name}`;
            loadMockChannels();
            renderMessages();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (text !== '') {
                    if (!messagesDatabase[activeChannelId]) messagesDatabase[activeChannelId] = [];
                    
                    messagesDatabase[activeChannelId].push({
                        username: myNick,
                        role: myCurrentRole,
                        text: text,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                    input.value = '';
                    renderMessages();
                }
            }
        }

        function renderMessages() {
            const chatMessages = document.getElementById('chatMessages');
            if(!chatMessages) return;
            chatMessages.innerHTML = "";

            if (activeChannelId === 'lewele') {
                chatMessages.innerHTML = `
                    <div class="welcome-message" style="padding: 20px 0;">
                        <h1 style="color: white; font-size: 32px; margin-bottom: 8px;"># Witamy na: # lewele!</h1>
                        <p style="color: #949ba4;">To jest początek kanału # lewele.</p>
                        <div style="border-bottom: 1px solid #3f4147; margin-top: 20px;"></div>
                    </div>
                `;
            }

            const list = messagesDatabase[activeChannelId] || [];
            list.forEach(msg => {
                const roleBadge = msg.role === 'ADMIN' ? `<span class="role-badge admin-color" style="border: 1px solid #f5a623; background: rgba(245,166,35,0.1);">ADMIN</span>` : '';
                const msgHTML = `
                    <div class="message">
                        <div class="message-avatar"></div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="author-name ${msg.role === 'ADMIN' ? 'admin-color' : 'gracz-color'}">${msg.username}</span>
                                ${roleBadge}
                                <span class="timestamp">Dzisiaj o ${msg.timestamp}</span>
                            </div>
                            <div class="message-text">${msg.text}</div>
                        </div>
                    </div>`;
                chatMessages.insertAdjacentHTML('beforeend', msgHTML);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function updateMockUsers() {
            const list = document.getElementById('onlineMembersList');
            if(!list) return;
            list.innerHTML = `
                <div class="member-group">Właściciel — 1</div>
                <div class="member"><div class="member-avatar" style="background-color: #f5a623;"></div><span class="member-name admin-color">Boka <span class="role-badge" style="background: #f5a623; color: black;">👑 GG</span></span></div>
                
                <div class="member-group">Dostępny — 10</div>
                <div class="member"><div class="member-avatar" style="background-color: #5865f2;"></div><span class="member-name" style="color: #dbdee1;">AdviceBot <span class="role-badge" style="background: #5865f2; color:white;">✓ APL.</span></span></div>
                <div class="member"><div class="member-avatar" style="background-color: #23a55a;"></div><span class="member-name" style="color: #dbdee1;">boht <span class="role-badge" style="background: #5865f2; color:white;">✓ APL.</span></span></div>
                <div class="member"><div class="member-avatar" style="background-color: #49c261;"></div><span class="member-name" style="color: #dbdee1;">Dyno <span class="role-badge" style="background: #5865f2; color:white;">✓ APL.</span></span></div>
                <div class="member"><div class="member-avatar" style="background-color: #00b0f4;"></div><span class="member-name" style="color: #dbdee1;">MEE6 <span class="role-badge" style="background: #5865f2; color:white;">✓ APL.</span></span></div>
                <div class="member"><div class="member-avatar" style="background-color: #f23f43;"></div><span class="member-name" style="color: #dbdee1;">ProtectMe Bot <span class="role-badge" style="background: #5865f2; color:white;">✓ APL.</span></span></div>
                <div class="member"><div class="member-avatar" style="background-color: #9b59b6;"></div><span class="member-name" style="color: #dbdee1;">Tickets <span class="role-badge" style="background: #5865f2; color:white;">✓ APL.</span></span></div>
            `;
        }
    </script>
</body>
</html>
